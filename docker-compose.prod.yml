services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tolbazy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-tolbazy_drive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tolbazy} -d ${POSTGRES_DB:-tolbazy_drive}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tolbazy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tolbazy_drive}?schema=public
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      API_HOST: 0.0.0.0
      API_PORT: 4000
      ADMIN_BASE_URL: ${ADMIN_BASE_URL:-http://localhost:3000}
      MIN_RIDE_PRICE_RUB: 150
      TEST_SUBSCRIPTION_PRICE_RUB: 0
    ports:
      - "4000:4000"

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
