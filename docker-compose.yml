services:
  postgres:
    image: postgres:17-alpine
    container_name: tolbazy-drive-postgres
    environment:
      POSTGRES_USER: tolbazy
      POSTGRES_PASSWORD: tolbazy
      POSTGRES_DB: tolbazy_drive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
